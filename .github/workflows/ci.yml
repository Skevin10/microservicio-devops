name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout código
      - uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Instalar dependencias
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # 4. Linter (flake8)
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # 5. Tests
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      # 6. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t microservicio:${{ github.sha }} .
          docker tag microservicio:${{ github.sha }} microservicio:latest

      # 7. Test Docker container
      - name: Test Docker container
        run: |
          docker run -d --name test-app -p 8080:8080 -e APP_VERSION=1.0.0 microservicio:latest
          sleep 2
          curl http://localhost:8080/health || exit 1
          docker stop test-app
          docker rm test-app
